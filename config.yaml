# invest-tracker sample config
output_dir: output
db_path: output/prices.db
csv_path: output/prices.csv

summarizer:
  mode: rule
  model: claude-haiku-4-5-20251001
  sector_model: claude-haiku-4-5-20251001
  max_retries: 1
  debug_dir: output/debug

# Static inputs still work with:
#   python main.py run -c config.yaml
presentations:
  - presenter: Kim
    company: Samsung Electronics
    ticker: 005930.KS
    files:
      - samples/samsung.txt

  - presenter: Lee
    company: NVIDIA
    ticker: NVDA
    files:
      - samples/nvda.txt

  - presenter: Park
    company: Tesla
    ticker: TSLA
    files:
      - samples/tsla.txt

  - presenter: Jung
    company: Kakao
    ticker: 035720.KS
    files:
      - samples/kakao.pptx

  - presenter: Choi
    company: Apple
    ticker: AAPL
    files:
      - samples/apple.docx

  - presenter: Seo
    company: Microsoft
    ticker: MSFT
    files:
      - samples/microsoft.pdf

automation:
  # Optional but recommended. Folder names and filenames often do not contain yfinance tickers.
  ticker_map:
    Samsung: 005930.KS
    Samsung Electronics: 005930.KS
    Kakao: 035720.KS
    NVIDIA: NVDA
    Tesla: TSLA
    Apple: AAPL
    Microsoft: MSFT

  # Create an integration at https://www.notion.so/my-integrations,
  # share the target database with it, then set NOTION_TOKEN.
  notion:
    token_env: NOTION_TOKEN
    parent_page_id: ""
    database_id: "665100ba979340c3b6679513fa2de8a5"
    title_property: "\uae30\uc5c5\uba85"
    month_property: "\ubc1c\ud45c\uc6d4"
